<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="header_container">
            <nav class="header_nav">
                <img src="media/Logo Color(2).svg" alt="logo">
                <ul class="header_list">
                    <li class="header_list-item"><a href="#" class="header_list-item-link active">Home</a></li>
                    <li class="header_list-item"><a href="#" class="header_list-item-link">Features</a></li>
